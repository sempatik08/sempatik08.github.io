<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>StoryTime — Login Callback</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body { font-family: system-ui, sans-serif; background: linear-gradient(160deg, #0f0c29, #483a8c);
           color: #fff; min-height: 100vh; display: grid; place-items: center; margin: 0; }
    main { text-align: center; padding: 2rem; max-width: 640px; }
    code { display: block; background: rgba(255,255,255,.12); border-radius: 12px;
           padding: 1rem; margin: 1rem 0; font-size: 1.05rem; word-break: break-all; }
    button { background: #fff; color: #302b63; border: 0; border-radius: 10px;
             padding: .7rem 1.4rem; font-size: 1rem; font-weight: 600; cursor: pointer; }
  </style>
</head>
<body>
  <main>
    <h1>Giriş tamamlandı ✅</h1>
    <p>Aşağıdaki yetkilendirme kodunu kopyalayıp kurulum asistanına yapıştır:</p>
    <code id="code">kod bulunamadı — adres çubuğundaki ?code= kısmına bak</code>
    <button onclick="copy()">Kodu kopyala</button>
  </main>
  <script>
    const params = new URLSearchParams(location.search);
    const code = params.get("code");
    if (code) document.getElementById("code").textContent = code;
    function copy() { navigator.clipboard.writeText(code || ""); }
  </script>
</body>
</html>
